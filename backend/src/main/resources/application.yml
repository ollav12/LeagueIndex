# =======================
# Common/default settings
# =======================
spring:
  application:
    name: leaguetracker
  profiles:
    active: dev  # default, can be overridden
server:
  port: 8080
  max-http-request-header-size: 16KB
  forward-headers-strategy: framework
  compression:
    enabled: true
    min-response-size: 2KB

  servlet:
    session:
      timeout: 30m
      persistent: false
      tracking-modes: cookie
      cookie:
        http-only: true
        secure: true
        name: leagueindex-session
        same-site: strict

  tomcat:
    max-swallow-size: 2MB
    max-http-form-post-size: 2MB
    connection-timeout: 5s
    threads.max: 200

    accesslog:
      enabled: false # Set true to enable access logs for auditing etc, disk space considerations
      directory: logs
      file-date-format: yyyy-MM-dd
      prefix: access_log
      suffix: .log

management:
  endpoints:
    web:
      exposure:
        include:
          - prometheus

riot:
  api-key: ${RIOT_API_KEY}

# =======================
# Production profile
# =======================
---
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: jdbc:postgresql://prod-db:5432/prod_database
    username: user
    password: password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  data:
    redis:
      host: redis-prod
      port: 6379
      password: your-prod-password
      timeout: 2000
      connect-timeout: 2000

# Logging for prod
logging:
  level:
    root: INFO
    "[org.springframework]": INFO
    "[org.hibernate.SQL]": WARN
    "[org.springframework.data.redis]": INFO
    "[io.lettuce.core]": INFO
    "[com.leaguetracker.app]": INFO

# Disable Swagger in prod
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

# =======================
# Development profile
# =======================
---
spring:
  config:
    import: optional:file:.env[.properties]
    activate:
      on-profile: dev
  datasource:
    url: jdbc:postgresql://localhost:5432/leaguetracker
    username: user
    password: password
    driver-class-name: org.postgresql.Driver
  jpa:
    show-sql: false
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: true
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000
      connect-timeout: 2000
  cache:
    type: redis
    redis:
      time-to-live: 86400000 # 24 hours
      cache-null-values: false

# Logging for dev (verbose)
logging:
  level:
    root: INFO
    "[org.hibernate.SQL]": OFF
    "[org.hibernate.type.descriptor.sql.BasicBinder]": WARN
    "[org.springframework.data.redis]": OFF
    "[org.springframework.cache]": TRACE
    "[io.lettuce.core]": OFF
    "[com.leaguetracker.app]": DEBUG
    "[org.springframework.boot.autoconfigure.cache]": DEBUG

# Enable Swagger in dev
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
  info:
    title: LeagueIndex API
    description: API documentation for LeagueIndex backend
    version: 1.0.0

# =======================
# Test profile
# =======================
---
spring:
  config:
    activate:
      on-profile: test
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 1000

# Logging for test
logging:
  level:
    root: WARN
    "[org.springframework]": WARN
    "[com.leaguetracker.app]": DEBUG

# Swagger not needed in tests
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false